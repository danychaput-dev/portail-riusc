name: Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Tests unitaires (Vitest) ──────────────────────────────────
  unit-tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dependances
        run: npm ci

      - name: Lancer les tests unitaires
        run: npm test

      - name: Rapport de couverture
        if: always()
        run: npm run test:coverage || true

  # ── Tests E2E (Playwright) ───────────────────────────────────
  e2e-tests:
    name: Tests E2E
    runs-on: ubuntu-latest
    needs: unit-tests  # Ne roule que si les tests unitaires passent
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dependances
        run: npm ci

      - name: Installer Playwright
        run: npx playwright install --with-deps chromium

      - name: Lancer les tests E2E
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://portail.riusc.ca' }}

      - name: Sauvegarder les screenshots en cas d'echec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

  # ── Build verification ───────────────────────────────────────
  build-check:
    name: Verification build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dependances
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_N8N_BASE_URL: https://n8n.aqbrs.ca
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
