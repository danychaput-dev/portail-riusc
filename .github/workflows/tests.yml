name: Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Variables factices pour le build et les tests
  # (les vrais secrets sont dans Vercel pour la prod)
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
  NEXT_PUBLIC_N8N_BASE_URL: https://n8n.aqbrs.ca
  NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder
  NEXT_PUBLIC_TWILIO_PHONE: "+10000000000"

jobs:
  # ── Tests unitaires (Vitest) ──────────────────────────────────
  unit-tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dependances
        run: npm ci

      - name: Lancer les tests unitaires
        run: npm test

  # ── Tests E2E (Playwright) ───────────────────────────────────
  e2e-tests:
    name: Tests E2E
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dependances
        run: npm ci

      - name: Installer Playwright
        run: npx playwright install --with-deps chromium

      - name: Lancer les tests E2E
        run: npm run test:e2e
        env:
          CI: true
          E2E_BASE_URL: https://portail.riusc.ca

      - name: Sauvegarder les screenshots en cas d'echec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

  # ── Build verification ───────────────────────────────────────
  build-check:
    name: Verification build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dependances
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          ANTHROPIC_API_KEY: sk-ant-placeholder
          RESEND_API_KEY: re_placeholder
